<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechLog Pro | Executive Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white border-b px-6 py-4 sticky top-0 z-40 shadow-sm flex justify-between items-center">
        <h1 class="text-xl font-black uppercase tracking-tight">TechLog<span class="text-indigo-600">Pro</span></h1>
        <button onclick="openModal()" class="bg-indigo-600 text-white p-3 rounded-2xl shadow-lg hover:bg-indigo-700 transition">
            + New Log
        </button>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div id="log-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2rem] p-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Repair Intake</h2>
            <form id="logForm" class="space-y-4">
                <input id="customerName" required placeholder="Client Name" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                <input id="brand" placeholder="Brand" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                <textarea id="notes" placeholder="Initial Condition..." class="w-full p-4 bg-slate-100 rounded-2xl outline-none"></textarea>
                <div class="flex gap-4">
                    <button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-200 rounded-2xl font-bold">Cancel</button>
                    <button type="submit" class="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-bold">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('techLogs')) || [];

        function render() {
            const list = document.getElementById('log-list');
            list.innerHTML = logs.map((l, i) => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                    <h3 class="text-lg font-black">${l.customerName}</h3>
                    <p class="text-indigo-600 font-bold text-sm">${l.brand}</p>
                    <p class="text-slate-500 text-xs mt-2 italic">"${l.notes}"</p>
                    <button onclick="deleteLog(${i})" class="mt-4 text-rose-500 text-xs font-black uppercase">Delete</button>
                </div>
            `).join('');
        }

        document.getElementById('logForm').onsubmit = (e) => {
            e.preventDefault();
            const newLog = {
                customerName: document.getElementById('customerName').value,
                brand: document.getElementById('brand').value,
                notes: document.getElementById('notes').value
            };
            logs.unshift(newLog);
            localStorage.setItem('techLogs', JSON.stringify(logs));
            closeModal();
            render();
        };

        function deleteLog(index) {
            logs.splice(index, 1);
            localStorage.setItem('techLogs', JSON.stringify(logs));
            render();
        }

        const openModal = () => document.getElementById('modal').classList.remove('hidden');
        const closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        render();
    </script>
</body>
    </html>
